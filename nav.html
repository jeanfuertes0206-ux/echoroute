<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <title>EchoRoute - Navigation</title>
 <style>
   body {
     font-family: 'Poppins', sans-serif;
     background: #e3e5e8;
     margin: 80px;
     padding: 20px;
   }


   a {
 text-decoration: none; /* removes underline */
}


a:hover {
  color: #f1c40f;
  transition: 0.3s ease;
}


   /* Title bar */
   .title-bar {
     display: flex;
     align-items: center;
     margin-bottom: 20px;
     font-size: 35px;
   }
   .title-bar i {
     font-size: 30px;
     margin-right: 30px;
     cursor: pointer;
   }
   .title-bar h2 {
     margin: 0;
   }


   /* Quick actions */
   .quick-actions {
     display: flex;
     gap: 15px;
     margin-bottom: 20px;
   }
   .action-btn {
     flex: 1;
     padding: 15px;
     border-radius: 15px;
     border: none;
     font-size: 20px;
     font-weight: bold;
     cursor: pointer;
     display: flex;
     align-items: center;
     justify-content: center;
     gap: 8px;
   }
   .action-btn.location {
     background: #f1c40f;
     color: #000;
     margin-bottom: 20px;
     margin-top: 10px;
   }


   .action-btn.saved {
     background: #fff;
     color: #333;
     margin-bottom: 20px;
     margin-top: 10px;
   }


   .action-btn:hover {
     background: #ffdf7d;
     transition: 0.5s ease;
     box-shadow: 0 6px 14px rgba(0,0,0,0.15);
   }


   /* Recent destinations */
   .section-title {
     font-size: 25px;
     font-weight: bold;
     margin-bottom: 10px;
   }


   .destinations {
     display: flex;
     flex-direction: column;
     gap: 10px;
   }


   .destination {
     display: flex;
     height: 80px;
     width: 55%;
     align-items: center;
     padding: 12px;
     border-radius: 18px;
     background: #fff;
     cursor: pointer;
     border: 0px;
     margin: 10px;
   }


   header {
     position: sticky;  
     top: 0;                /* stick to the top */
     left: 0;
     width: 100%;           /* full width */
     padding: 15px 20px;
     font-size: 20px;
     font-weight: bold;
     z-index: 100; 
     backdrop-filter: blur(8px);
   }


   .destination i {
     font-size: 20px;
     margin-right: 20px;
     margin-left: 10px;
     color: #3498db;
   }


   .destination span {
     font-size: 20px;
   }


   .destination:hover {
     background: #f1c40f;
     transition: 0.5s ease;
     box-shadow: 0 6px 14px rgba(0,0,0,0.15) ;
   }


span {
 align-content: center;
}


body {
     font-family: Arial, sans-serif;
     background: #f4f6f9;
     padding: 40px;
   }


   .search-container {
     display: flex;
     justify-content: center;
     align-items: center;
     gap: 10px;
     width: 80%;
     margin: auto;
   }


   .search-input {
     flex: 1;
     padding: 12px;
     border: 1px solid #ccc;
     border-radius: 15px;
     font-size: 20px;
     margin: 10px;
   }


   .search-btn {
     padding: 12px 20px;
     background: #3498db;
     color: #fff;
     border: none;
     border-radius: 15px; /* more rounded corners */
     font-size: 20px;
     font-weight: bold;
     cursor: pointer;
     transition: background 0.2s ease;
   }


   .search-btn:hover {
     background: #2980b9;
     transition: 0.5s ease;
   }


 </style>
 <!-- Font Awesome for icons -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
 <!-- Title bar -->
 <header>
 <div class="title-bar">
   <a href="dashboard.html">
   <i class="fa-solid fa-arrow-left"></i>
 </a>
   <h2>Navigation</h2>
 </div>
 </header>




<div class="search-container">
   <input type="text" class="search-input" placeholder="Enter destination address">
   <button class="search-btn">
     <i class="fa-solid fa-microphone"></i>
   </button>
   </div>
   <center>


   <button class="search-btn" style="margin-bottom: 20px; margin-top: 20px; width: 350px;">
   <i class="fa-solid fa-magnifying-glass"></i>
   <span>Find Route</span>
   </button>
   </center>




 <!-- Quick actions -->
 <div class="quick-actions">
   <button class="action-btn location">
     <i class="fa-solid fa-location-crosshairs"></i> Use Current Location
   </button>
   <button class="action-btn saved">
     <i class="fa-solid fa-map-pin"></i> Saved Places
   </button>
 </div>


 <!-- Recent destinations -->
 <div class="section-title">Recent Destinations</div>
   <div class="destinations">
     <center>
   <button class="destination">
     <i class="fa-solid fa-house"></i>
     <span>Home</span>
   </button>
   <button class="destination">
     <i class="fa-solid fa-briefcase"></i>
     <span>Work</span>
   </button>
   <button class="destination">
     <i class="fa-solid fa-tree"></i>
     <span>Central Park</span>
   </button>
 </center>
 </div>
</body>
</html>
