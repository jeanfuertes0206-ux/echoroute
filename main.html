<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EchoRoute - Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>


  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }


    body {
      background: #f3f4f6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }


    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 30px;
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }


    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #0e8a94;
      font-size: 18px;
    }


    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }


    .login-box {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }


    .login-box img {
      width: 60px;
      margin-bottom: 15px;
    }


    h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }


    .subtitle {
      color: #666;
      margin-bottom: 28px;
    }


    form {
      text-align: left;
    }


    label {
      font-size: 14px;
      font-weight: 500;
    }


    .input-group {
      margin-top: 6px;
      margin-bottom: 18px;
    }


    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      background: #e5e7eb;
      outline: none;
      font-size: 14px;
    }


    input:focus {
      border: 2px solid #0e8a94;
      background: #ffffff;
    }


    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: #0e8a94;
      color: white;
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s ease;
      margin-top: 10px;
    }


    .btn:hover {
      background: #0c737c;
    }


    .btn:active {
      transform: scale(0.98);
    }


    .footer-text {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
      color: #555;
    }


    .footer-text a {
      color: #0e8a94;
      text-decoration: none;
      font-weight: 500;
    }


    .footer-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>


  <div class="top-bar">
    <div class="logo">
      <i data-feather="eye"></i>
      EchoRoute
    </div>
    <i data-feather="log-in"></i>
  </div>


  <div class="container">
    <div class="login-box">


      <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" alt="Logo">


      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to continue your journey</p>


      <form id="loginForm">
        <label>Email Address</label>
        <div class="input-group">
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>


        <label>Password</label>
        <div class="input-group">
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>


        <button type="submit" class="btn">
          <i data-feather="log-in"></i>
          Sign In
          <i data-feather="arrow-right"></i>
        </button>
      </form>


      <div class="footer-text">
        Don't have an account?<br>
        <a href="create-account.html">Create Account →</a>
      </div>


    </div>
  </div>


  <script>
    feather.replace();


    const form = document.getElementById("loginForm");


    form.addEventListener("submit", function(e) {
      e.preventDefault();


      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;


      const storedUser = JSON.parse(localStorage.getItem("echorouteUser"));


      if (!storedUser) {
        alert("No account found. Please register first.");
        return;
      }


      if (email === storedUser.email && password === storedUser.password) {
        // Save login session
        localStorage.setItem("isLoggedIn", "true");


        // Redirect to dashboard
        window.location.href = "dashboard.html";
      } else {
        alert("Invalid email or password.");
      }
    });
  </script>


</body>
</html>
